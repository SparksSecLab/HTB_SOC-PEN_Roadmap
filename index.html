<html lang="en">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #070710;
      --pt-accent: #ff4500;
      --pt-glow: rgba(255,69,0,0.3);
      --pt-border: rgba(255,69,0,0.4);
      --pt-tag: rgba(255,69,0,0.15);
      --soc-accent: #00d4ff;
      --soc-glow: rgba(0,212,255,0.3);
      --soc-border: rgba(0,212,255,0.4);
      --soc-tag: rgba(0,212,255,0.12);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(255,69,0,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 0%, rgba(0,180,255,0.06) 0%, transparent 60%),
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.012) 2px, rgba(255,255,255,0.012) 4px);
      font-family: 'Share Tech Mono', monospace;
      color: #f0f0f0;
      min-height: 100vh;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0a0a14; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    @keyframes scanline {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100vh); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .scanline {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: rgba(255,255,255,0.03);
      animation: scanline 8s linear infinite;
      pointer-events: none;
      z-index: 100;
    }

    .header {
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 28px 24px 20px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .header-inner { max-width: 720px; margin: 0 auto; }

    .header-tag {
      font-size: 9px;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.3);
      margin-bottom: 6px;
    }

    .header-title {
      font-family: 'Orbitron', monospace;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 0.08em;
      color: #fff;
      margin-bottom: 20px;
      transition: text-shadow 0.3s ease;
    }

    .header-title.pentest { text-shadow: 0 0 30px var(--pt-glow); }
    .header-title.soc { text-shadow: 0 0 30px var(--soc-glow); }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 22px;
      vertical-align: middle;
      margin-left: 4px;
      animation: blink 1s step-end infinite;
    }
    .cursor.pentest { background: var(--pt-accent); }
    .cursor.soc { background: var(--soc-accent); }

    .track-buttons { display: flex; gap: 10px; flex-wrap: wrap; }

    .track-btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      padding: 9px 18px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s ease;
      background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.15);
    }
    .track-btn:hover { opacity: 1; transform: translateY(-1px); }
    .track-btn.active-pentest {
      border-color: var(--pt-accent);
      background: var(--pt-tag);
      color: var(--pt-accent);
      box-shadow: 0 0 12px rgba(255,69,0,0.3);
    }
    .track-btn.active-soc {
      border-color: var(--soc-accent);
      background: var(--soc-tag);
      color: var(--soc-accent);
      box-shadow: 0 0 12px rgba(0,212,255,0.3);
    }

    .content { max-width: 720px; margin: 0 auto; padding: 24px 16px 48px; }

    .track-header { margin-bottom: 24px; animation: fadeUp 0.3s ease both; }

    .track-header-line {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .track-line-bar { width: 32px; height: 2px; }
    .track-line-bar.pentest { background: linear-gradient(90deg, var(--pt-accent), transparent); }
    .track-line-bar.soc { background: linear-gradient(90deg, var(--soc-accent), transparent); }

    .track-label { font-size: 9px; letter-spacing: 0.25em; }
    .track-label.pentest { color: var(--pt-accent); }
    .track-label.soc { color: var(--soc-accent); }

    .track-desc {
      font-size: 11px;
      color: rgba(200,210,225,0.6);
      line-height: 1.7;
      padding-left: 14px;
      margin-bottom: 6px;
    }
    .track-desc.pentest { border-left: 2px solid var(--pt-border); }
    .track-desc.soc { border-left: 2px solid var(--soc-border); }

    .progress-bar { display: flex; gap: 4px; margin-top: 14px; }
    .progress-dot {
      flex: 1; height: 4px; border-radius: 2px;
      background: rgba(255,255,255,0.1);
      cursor: pointer;
      transition: background 0.2s ease, box-shadow 0.2s ease;
    }
    .progress-dot.active-pentest { background: var(--pt-accent); box-shadow: 0 0 6px var(--pt-glow); }
    .progress-dot.active-soc { background: var(--soc-accent); box-shadow: 0 0 6px var(--soc-glow); }

    .progress-count { font-size: 9px; color: rgba(255,255,255,0.25); margin-top: 5px; letter-spacing: 0.1em; }

    .step-card {
      margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      background: rgba(8,8,14,0.7);
      cursor: pointer;
      overflow: hidden;
      transition: all 0.25s ease;

    .step-card:hover { border-color: rgba(255,255,255,0.15); }
    .step-card.open-pentest {
      border-color: var(--pt-border);
      background: linear-gradient(135deg, rgba(10,10,16,0.95) 0%, rgba(15,15,25,0.98) 100%);
      box-shadow: 0 0 20px var(--pt-glow), inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .step-card.open-soc {
      border-color: var(--soc-border);
      background: linear-gradient(135deg, rgba(10,10,16,0.95) 0%, rgba(15,15,25,0.98) 100%);
      box-shadow: 0 0 20px var(--soc-glow), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .step-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
    }

    .step-phase { font-size: 10px; letter-spacing: 0.15em; opacity: 0.8; min-width: 70px; }
    .step-phase.pentest { color: var(--pt-accent); }
    .step-phase.soc { color: var(--soc-accent); }

    .step-icon { font-size: 18px; min-width: 24px; }

    .step-title-wrap { flex: 1; }
    .step-title { font-size: 13px; color: #f0f0f0; letter-spacing: 0.05em; font-weight: bold; }
    .step-time { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 2px; letter-spacing: 0.08em; }

    .step-toggle { font-size: 16px; transition: transform 0.2s ease; }
    .step-toggle.pentest { color: var(--pt-accent); }
    .step-toggle.soc { color: var(--soc-accent); }
    .step-toggle.rotated { transform: rotate(90deg); }

    .step-body { padding: 0 20px 20px; display: none; animation: fadeUp 0.2s ease both; }
    .step-body.visible { display: block; }

    .step-divider { height: 1px; margin-bottom: 16px; }
    .step-divider.pentest { background: linear-gradient(90deg, rgba(255,69,0,0.4), transparent); }
    .step-divider.soc { background: linear-gradient(90deg, rgba(0,212,255,0.4), transparent); }

    .section-label { font-size: 9px; letter-spacing: 0.2em; margin-bottom: 10px; }
    .section-label.pentest { color: var(--pt-accent); }
    .section-label.soc { color: var(--soc-accent); }

    .task-list { margin-bottom: 16px; }
    .task-item { display: flex; gap: 10px; margin-bottom: 7px; align-items: flex-start; }
    .task-dot { font-size: 8px; margin-top: 4px; flex-shrink: 0; }
    .task-dot.pentest { color: #ff6b35; }
    .task-dot.soc { color: var(--soc-accent); }
    .task-text { font-size: 11px; color: rgba(220,220,230,0.85); line-height: 1.6; letter-spacing: 0.02em; }

    .resource-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .resource-tag {
      font-size: 10px;
      border-radius: 3px;
      padding: 3px 8px;
      letter-spacing: 0.04em;
    }
    .resource-tag.pentest { color: var(--pt-accent); background: var(--pt-tag); border: 1px solid var(--pt-border); }
    .resource-tag.soc { color: var(--soc-accent); background: var(--soc-tag); border: 1px solid var(--soc-border); }

    .tip-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 4px;
      padding: 10px 14px;
    }
    .tip-box.pentest { border-left: 3px solid var(--pt-accent); }
    .tip-box.soc { border-left: 3px solid var(--soc-accent); }

    .tip-label { font-size: 9px; letter-spacing: 0.15em; margin-bottom: 5px; }
    .tip-label.pentest { color: var(--pt-accent); }
    .tip-label.soc { color: var(--soc-accent); }

    .tip-text { font-size: 11px; color: rgba(200,210,220,0.75); line-height: 1.6; font-style: italic; }

    .footer {
      margin-top: 32px;
      padding: 16px 20px;
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 6px;
      background: rgba(255,255,255,0.02);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    .footer-left { font-size: 9px; color: rgba(255,255,255,0.25); letter-spacing: 0.15em; }
    .footer-right { font-size: 9px; letter-spacing: 0.1em; }
    .footer-right.pentest { color: var(--pt-accent); }
    .footer-right.soc { color: var(--soc-accent); }
  </style>
</head>

<div class="scanline"></div>

let currentTrack = 'pentest';
let openSteps = { pentest: new Set([0]), soc: new Set([0]) };

function switchTrack(track) {
  currentTrack = track;
  render();
}

function toggleStep(index) {
  const set = openSteps[currentTrack];
  if (set.has(index)) { set.delete(index); } else { set.add(index); }
  render();
}

function render() {
  const t = currentTrack;
  const track = data[t];

  document.getElementById('mainTitle').className = `header-title ${t}`;
  document.getElementById('cursor').className = `cursor ${t}`;
  document.getElementById('btn-pentest').className = `track-btn${t === 'pentest' ? ' active-pentest' : ''}`;
  document.getElementById('btn-soc').className = `track-btn${t === 'soc' ? ' active-soc' : ''}`;

  document.getElementById('trackBar').className = `track-line-bar ${t}`;
  document.getElementById('trackLabel').className = `track-label ${t}`;
  document.getElementById('trackLabel').textContent = track.label;
  document.getElementById('trackDesc').className = `track-desc ${t}`;
  document.getElementById('trackDesc').textContent = track.desc;

  const pb = document.getElementById('progressBar');
  pb.innerHTML = '';
  track.steps.forEach((_, i) => {
    const dot = document.createElement('div');
    const isOpen = openSteps[t].has(i);
    dot.className = `progress-dot${isOpen ? ' active-' + t : ''}`;
    dot.onclick = () => toggleStep(i);
    pb.appendChild(dot);
  });
  document.getElementById('progressCount').textContent = `${openSteps[t].size} / ${track.steps.length} PHASES EXPANDED`;
  document.getElementById('footerRight').className = `footer-right ${t}`;

  const container = document.getElementById('stepsContainer');
  container.innerHTML = '';
  track.steps.forEach((step, i) => {
    const isOpen = openSteps[t].has(i);
    const card = document.createElement('div');
    card.className = `step-card${isOpen ? ' open-' + t : ''}`;
    card.onclick = () => toggleStep(i);

    const tasksHTML = step.tasks.map(task =>
      `<div class="task-item">
        <span class="task-dot ${t}">◆</span>
        <span class="task-text">${task}</span>
      </div>`
    ).join('');

    const resourcesHTML = step.resources.map(r =>
      `<span class="resource-tag ${t}">${r}</span>`
    ).join('');

    card.innerHTML = `
      <div class="step-header">
        <div class="step-phase ${t}">${step.phase}</div>
        <span class="step-icon">${step.icon}</span>
        <div class="step-title-wrap">
          <div class="step-title">${step.title}</div>
          <div class="step-time">${step.time}</div>
        </div>
        <div class="step-toggle ${t}${isOpen ? ' rotated' : ''}">›</div>
      </div>
      <div class="step-body${isOpen ? ' visible' : ''}">
        <div class="step-divider ${t}"></div>
        <div class="section-label ${t}">▸ OBJECTIVES</div>
        <div class="task-list">${tasksHTML}</div>
        <div class="section-label ${t}">▸ RESOURCES</div>
        <div class="resource-list">${resourcesHTML}</div>
        <div class="tip-box ${t}">
          <div class="tip-label ${t}">◈ PRO TIP</div>
          <div class="tip-text">${step.tip}</div>
        </div>
      </div>
    `;

    container.appendChild(card);
  });
}

render();
</script>
</body>
</html>
